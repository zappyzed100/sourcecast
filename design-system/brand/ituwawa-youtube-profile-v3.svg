<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">いつわわ YouTubeプロフィール画像</title>
  <desc id="desc">濃紺の円に、生成り色の「いつわわ」を二段で配置した文字ロゴ</desc>
  <rect width="1024" height="1024" fill="#ffffff"/>
  <circle cx="512" cy="512" r="480" fill="#172033"/>
  <g
    fill="#f4ead5"
    font-family="'BIZ UDPGothic', 'Yu Gothic UI', 'Yu Gothic', sans-serif"
    font-weight="700"
    text-anchor="middle"
  >
    <text x="512" y="448" font-size="272" letter-spacing="-22">いつ</text>
    <text x="512" y="755" font-size="344" letter-spacing="-34">わわ</text>
  </g>
</svg>
