# Dependabot handles only the guardrails-kit submodule.
# - emilkowalski-skills is excluded: updates come from update-ui-skills.yml,
#   which only opens a PR when the adopted skill paths actually change.
# - awesome-design-md is excluded: reference material, updated manually
#   (`git submodule update --remote`) when wanted.
# (see .upstream/sources.yaml for both decisions)
version: 2
updates:
  - package-ecosystem: gitsubmodule
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "upstream/ui-skills/emilkowalski-skills"
      - dependency-name: "upstream/design-md/awesome-design-md"
