# Record of upstream source selection and how each one is integrated/updated.
# When adopting a new upstream (or new skill paths), add it here and keep
# scripts/setup-upstreams.ps1 and .github/workflows/update-ui-skills.yml in sync.
# Each entry records the rationale so the selection can be re-evaluated later
# without reconstructing the reasoning (lesson from 2026-07-15: the original
# selection had no recorded rationale).

sources:
  - id: guardrails-kit
    repository: zappyzed100/guardrails-kit
    integration: submodule
    update: dependabot
    scope: repository
    rationale: >-
      The whole repository is the product base; nothing to cherry-pick.

  - id: emil-ui-skills
    repository: emilkowalski/skills
    integration: submodule-sparse-checkout
    paths:
      - skills/animation-vocabulary
      - skills/apple-design
      - skills/emil-design-eng
      - skills/improve-animations
      - skills/review-animations
    update: path-filtered-github-action
    rationale: >-
      Adopted first among the UI-skill candidates because it is the only one
      whose shape fits submodule + sparse-checkout: small self-contained
      Markdown skills under skills/<name>/, one recognized author
      (design engineer; Vercel/Linear background), no runtime or install
      footprint. 2026-07-15: expanded from 2 skills (emil-design-eng,
      review-animations) to all 5 — user decision: the extra skills are
      Markdown-only, cost nothing to carry, and will help once UI work starts.
      New skills added upstream later remain opt-in (explicit paths, no
      wildcard).

  # --- Not integrated (recorded so candidates and policy are not lost) ---

  - id: awesome-design-md
    repository: voltagent/awesome-design-md
    integration: none
    update: none
    status: reference
    rationale: >-
      Kept as a reference, not integrated (user decision 2026-07-15). It is a
      collection of per-brand DESIGN.md analyses, not Claude skills — useful
      to consult during implementation. Whether to vendor specific DESIGN.md
      files can only be decided after the UI direction is chosen; revisit then.

  - id: ui-ux-pro-max-skill
    repository: nextlevelbuilder/ui-ux-pro-max-skill
    integration: vendored-copy
    vendored-to: .claude/skills/
    vendored-from-sha: f8ac5e1266dba8354ea96e19994d9f4345e7ec31 # GitHub main, v2.11.0
    update: manual-revendor
    status: adopted
    special-handling:
      - python-via-uv: >-
          The skill's `python3 scripts/...` instructions are read as
          `uv run python .claude/skills/ui-ux-pro-max/scripts/...`
          (kit GUARDRAILS §7.1). Smoke-tested via uv on 2026-07-15.
      - vendored-exclusion: >-
          At kit bootstrap time, exclude .claude/skills/ from
          header/print-ban/structure checks (third-party code is not held to
          this repo's conventions).
      - generated-artifact: >-
          `--persist` output design-system/ is committed (design decisions)
          and registered in GENERATED_PATTERNS at kit bootstrap time.
    rationale: >-
      Adopted into the workbench 2026-07-15 (user decision: accept the three
      special handlings above; merging into the guardrails-kit repo itself was
      considered and rejected — different layers, double upstream tracking).
      Verified before adoption (repo inspected at v2.11.0): installs
      self-contained into .claude/skills/ (orchestrator SKILL.md + CSV
      databases + Python search scripts + 6 sub-skills); does NOT touch
      CLAUDE.md, .claude/settings.json, or .mcp.json — no file-level collision
      with guardrails-kit. Scripts make no network calls (offline BM25
      search). NOTE the npm package (ui-ux-pro-max-cli) lags GitHub main, so
      we vendored by reproducing the installer's render+copy from a clone of
      the pinned SHA instead of `npx ui-ux-pro-max-cli init --ai claude`.
      To update: clone upstream, re-render SKILL.md from
      cli/assets/templates/(base/skill-content.md + platforms/claude.json),
      re-copy cli/assets/{data,scripts} into .claude/skills/ui-ux-pro-max/
      and cli/assets/skills/* as sibling skills, then bump vendored-from-sha.
